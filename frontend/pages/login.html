<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taska | Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main class="page-center">
        <section class="card auth-card">
            <img class="brand-logo" src="../assets/logo.svg" alt="Taska">
            <h1>Login</h1>
            <p>Enter your email and password to continue.</p>

            <form id="loginForm" class="auth-form" novalidate>
                <label for="email">
                    Email
                    <input type="email" id="email" name="email" autocomplete="email" required>
                </label>

                <label for="password">
                    Password
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                </label>

                <button class="button button-primary full-width" type="submit">Login</button>
                <p id="message" class="form-message" role="status" aria-live="polite"></p>
            </form>

            <p class="auth-switch">
                New here? <a href="register.html">Create an account</a>
            </p>
        </section>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
